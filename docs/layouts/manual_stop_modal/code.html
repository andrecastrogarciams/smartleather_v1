<!DOCTYPE html>

<html class="light" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-secondary-container": "#526772",
              "surface-dim": "#cfdce4",
              "outline-variant": "#c3c6cf",
              "primary": "#002a4d",
              "on-primary-fixed-variant": "#25486f",
              "inverse-on-surface": "#e6f3fb",
              "surface-container-high": "#ddeaf2",
              "on-secondary": "#ffffff",
              "background": "#f4faff",
              "primary-container": "#1b4066",
              "tertiary-fixed": "#83fc8e",
              "surface-container": "#e3f0f8",
              "on-primary": "#ffffff",
              "surface-tint": "#3e6088",
              "on-error-container": "#93000a",
              "error": "#ba1a1a",
              "on-error": "#ffffff",
              "on-tertiary": "#ffffff",
              "on-background": "#111d23",
              "on-tertiary-fixed": "#002106",
              "on-secondary-fixed": "#071e27",
              "secondary-container": "#cfe6f2",
              "tertiary": "#00300b",
              "surface-variant": "#d7e4ec",
              "on-primary-fixed": "#001c37",
              "on-surface-variant": "#43474e",
              "inverse-primary": "#a7c9f6",
              "tertiary-fixed-dim": "#66df75",
              "secondary": "#4c616c",
              "surface-bright": "#f4faff",
              "on-secondary-fixed-variant": "#354a53",
              "surface-container-low": "#e9f6fd",
              "on-tertiary-fixed-variant": "#00531a",
              "primary-fixed": "#d2e4ff",
              "surface-container-lowest": "#ffffff",
              "secondary-fixed": "#cfe6f2",
              "secondary-fixed-dim": "#b4cad6",
              "surface-container-highest": "#d7e4ec",
              "outline": "#73777f",
              "error-container": "#ffdad6",
              "on-surface": "#111d23",
              "on-tertiary-container": "#46c05a",
              "inverse-surface": "#263238",
              "tertiary-container": "#004916",
              "primary-fixed-dim": "#a7c9f6",
              "on-primary-container": "#8aacd8",
              "surface": "#f4faff"
            },
            fontFamily: {
              "headline": ["Inter"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
    </style>
</head>
<body class="bg-surface text-on-surface font-body overflow-hidden">
<!-- TOP NAVIGATION SHELL (Shared Component) -->
<nav class="bg-gradient-to-r from-[#002a4d] to-[#1b4066] shadow-2xl shadow-blue-900/20 fixed top-0 z-50 w-full px-8 py-4 flex justify-between items-center">
<div class="flex items-center gap-8">
<span class="text-2xl font-black tracking-tighter text-white uppercase">SmartLeather</span>
<div class="hidden md:flex gap-6 items-center">
<a class="font-['Inter'] font-bold tracking-tight text-lg text-white border-b-2 border-sky-400 pb-1" href="#">Sector</a>
<a class="font-['Inter'] font-bold tracking-tight text-lg text-sky-300/70 hover:text-white transition-colors" href="#">Production Line</a>
</div>
</div>
<div class="flex items-center gap-4">
<button class="p-2 text-sky-50 hover:bg-white/10 transition-all duration-200 active:scale-95">
<span class="material-symbols-outlined">sensors</span>
</button>
<button class="p-2 text-sky-50 hover:bg-white/10 transition-all duration-200 active:scale-95">
<span class="material-symbols-outlined">sync</span>
</button>
</div>
</nav>
<!-- SIDE NAVIGATION SHELL (Shared Component) -->
<aside class="fixed left-0 top-0 h-full pt-20 flex flex-col z-40 w-24 md:w-64 bg-[#e3f0f8] dark:bg-[#0a1929] transition-all">
<div class="px-6 py-4">
<p class="font-['Inter'] font-semibold uppercase tracking-widest text-xs text-[#002a4d]">OPERATIONAL</p>
<p class="text-xs text-[#002a4d]/60">Control Center</p>
</div>
<nav class="mt-4 flex-1">
<button class="w-[calc(100%-1rem)] text-[#002a4d]/60 hover:bg-[#002a4d]/5 m-2 p-4 flex items-center gap-4 rounded-lg transition-all hover:translate-x-1 duration-300 active:ring-4 ring-sky-500/30">
<span class="material-symbols-outlined">play_circle</span>
<span class="hidden md:inline font-['Inter'] font-semibold uppercase tracking-widest text-xs">Start OP</span>
</button>
<button class="w-[calc(100%-1rem)] bg-[#002a4d] text-white rounded-lg m-2 p-4 flex items-center gap-4 shadow-lg hover:translate-x-1 duration-300 active:ring-4 ring-sky-500/30">
<span class="material-symbols-outlined">stop_circle</span>
<span class="hidden md:inline font-['Inter'] font-semibold uppercase tracking-widest text-xs">Stop Line</span>
</button>
<button class="w-[calc(100%-1rem)] text-[#002a4d]/60 hover:bg-[#002a4d]/5 m-2 p-4 flex items-center gap-4 rounded-lg transition-all hover:translate-x-1 duration-300 active:ring-4 ring-sky-500/30">
<span class="material-symbols-outlined">check_circle</span>
<span class="hidden md:inline font-['Inter'] font-semibold uppercase tracking-widest text-xs">Finish OP</span>
</button>
</nav>
<div class="p-4 border-t border-[#002a4d]/10">
<button class="w-full bg-error text-white font-bold py-3 rounded-lg flex items-center justify-center gap-2">
<span class="material-symbols-outlined">warning</span>
<span class="hidden md:inline">System Alert</span>
</button>
</div>
</aside>
<!-- DASHBOARD CONTENT (Dimmed Background) -->
<main class="pl-24 md:pl-64 pt-24 pb-16 px-8 min-h-screen opacity-30 grayscale pointer-events-none">
<header class="mb-10">
<h1 class="text-4xl font-black text-primary tracking-tight">Main Dashboard</h1>
<p class="text-secondary font-medium">Production Line SL-04: Active Status</p>
</header>
<!-- Bento Grid Production Metrics -->
<div class="grid grid-cols-1 md:grid-cols-4 gap-6">
<!-- Metric 1 -->
<div class="md:col-span-2 bg-surface-container-lowest p-8 rounded-xl shadow-sm border-l-8 border-primary">
<div class="flex justify-between items-start">
<div>
<span class="text-label-md font-bold uppercase tracking-widest text-secondary">Throughput</span>
<h2 class="text-6xl font-black text-primary mt-2">1,240<span class="text-xl ml-2 text-secondary">m²</span></h2>
</div>
<span class="material-symbols-outlined text-4xl text-primary">analytics</span>
</div>
</div>
<!-- Metric 2 -->
<div class="bg-surface-container p-6 rounded-xl">
<span class="text-label-md font-bold uppercase tracking-widest text-secondary">Efficiency</span>
<h2 class="text-4xl font-black text-tertiary mt-2">94.2%</h2>
</div>
<!-- Metric 3 -->
<div class="bg-surface-container p-6 rounded-xl">
<span class="text-label-md font-bold uppercase tracking-widest text-secondary">Uptime</span>
<h2 class="text-4xl font-black text-primary mt-2">07:22:15</h2>
</div>
<!-- Large Area Chart Placeholder -->
<div class="md:col-span-4 h-64 bg-surface-container-high rounded-xl flex items-center justify-center relative overflow-hidden">
<img class="absolute inset-0 w-full h-full object-cover mix-blend-multiply opacity-20" data-alt="Digital representation of complex industrial data visualization with clean lines and deep blue aesthetic" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDh1oUJlMrHkPZJzYNpl1e2SrlDjl32ikZ9q6Ff0Qy6hKNRG9VFI38JDSpx9QdXCs61pEY6kgzOHIKHO4y0D5HEl_J40cNTYdZUBf9QXjIHEsDO97sF_8O6frAGx7tAb1gRWzMNwPEkjxPr3b1nzbPBDCjmvXoXt3RCVcU2Jrhe1QGYg7jbvH4Ix0-VjkZndBuamxsEttgdSIBIv-k5klL0cj8r87udGIyzllIC2iMpfusvooUkuRyYFaPX6oh1Uk9QczdfKAFh6tM"/>
<div class="relative text-primary font-bold">PRODUCTION TREND OVERVIEW</div>
</div>
</div>
</main>
<!-- MODAL OVERLAY -->
<div class="fixed inset-0 z-[60] flex items-center justify-center p-4">
<!-- Backdrop -->
<div class="absolute inset-0 bg-on-background/60 backdrop-blur-md"></div>
<!-- Modal Card -->
<div class="relative w-full max-w-2xl bg-surface-container-lowest rounded-xl shadow-2xl shadow-on-background/30 overflow-hidden transform animate-in fade-in zoom-in duration-300">
<!-- Modal Header -->
<div class="bg-primary px-8 py-6 flex justify-between items-center">
<h2 class="text-white text-2xl font-black tracking-tight">ABRIR PARADA MANUAL</h2>
<button class="text-sky-300 hover:text-white transition-colors">
<span class="material-symbols-outlined text-3xl">close</span>
</button>
</div>
<div class="p-8 space-y-8">
<!-- Reason Selection -->
<section>
<label class="block text-label-md font-black text-primary uppercase tracking-widest mb-4">Motivo da Parada</label>
<div class="grid grid-cols-2 md:grid-cols-3 gap-4">
<button class="flex flex-col items-center justify-center p-6 border-2 border-outline-variant hover:border-primary hover:bg-primary/5 rounded-lg transition-all group active:scale-95">
<span class="material-symbols-outlined text-4xl text-on-secondary-container group-hover:text-primary mb-2">build</span>
<span class="text-xs font-bold text-on-surface-variant group-hover:text-primary uppercase">Manutenção</span>
</button>
<button class="flex flex-col items-center justify-center p-6 border-2 border-primary bg-primary/5 rounded-lg transition-all group active:scale-95 ring-2 ring-primary">
<span class="material-symbols-outlined text-4xl text-primary mb-2">inventory_2</span>
<span class="text-xs font-bold text-primary uppercase">Falta Material</span>
</button>
<button class="flex flex-col items-center justify-center p-6 border-2 border-outline-variant hover:border-primary hover:bg-primary/5 rounded-lg transition-all group active:scale-95">
<span class="material-symbols-outlined text-4xl text-on-secondary-container group-hover:text-primary mb-2">handyman</span>
<span class="text-xs font-bold text-on-surface-variant group-hover:text-primary uppercase">Troca Ferramenta</span>
</button>
<button class="flex flex-col items-center justify-center p-6 border-2 border-outline-variant hover:border-primary hover:bg-primary/5 rounded-lg transition-all group active:scale-95">
<span class="material-symbols-outlined text-4xl text-on-secondary-container group-hover:text-primary mb-2">cleaning_services</span>
<span class="text-xs font-bold text-on-surface-variant group-hover:text-primary uppercase">Limpeza</span>
</button>
<button class="flex flex-col items-center justify-center p-6 border-2 border-outline-variant hover:border-primary hover:bg-primary/5 rounded-lg transition-all group active:scale-95">
<span class="material-symbols-outlined text-4xl text-on-secondary-container group-hover:text-primary mb-2">person_pin</span>
<span class="text-xs font-bold text-on-surface-variant group-hover:text-primary uppercase">Refeição</span>
</button>
<button class="flex flex-col items-center justify-center p-6 border-2 border-outline-variant hover:border-primary hover:bg-primary/5 rounded-lg transition-all group active:scale-95">
<span class="material-symbols-outlined text-4xl text-on-secondary-container group-hover:text-primary mb-2">more_horiz</span>
<span class="text-xs font-bold text-on-surface-variant group-hover:text-primary uppercase">Outros</span>
</button>
</div>
</section>
<!-- Observation -->
<section>
<label class="block text-label-md font-black text-primary uppercase tracking-widest mb-4">Observação <span class="text-secondary font-normal">(Opcional)</span></label>
<textarea class="w-full h-32 bg-surface-container-high border-none rounded-lg p-4 focus:ring-4 focus:ring-primary/20 focus:bg-white transition-all text-on-surface placeholder:text-outline" placeholder="Descreva detalhes sobre a interrupção..."></textarea>
</section>
<!-- Modal Actions -->
<div class="flex flex-col md:flex-row gap-4 pt-4">
<button class="flex-1 h-14 bg-[#FFC107] hover:bg-[#FFB300] text-primary font-black uppercase tracking-widest rounded-lg flex items-center justify-center gap-3 transition-colors active:scale-[0.98] shadow-lg shadow-yellow-500/20">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">pause_circle</span>
                        CONFIRMAR PARADA
                    </button>
<button class="flex-1 h-14 border-2 border-outline-variant text-on-surface-variant hover:bg-surface-container hover:text-primary font-black uppercase tracking-widest rounded-lg flex items-center justify-center transition-all">
                        Cancelar
                    </button>
</div>
</div>
</div>
</div>
<!-- FOOTER SHELL (Shared Component) -->
<footer class="fixed bottom-0 left-0 w-full flex justify-between items-center px-8 py-3 bg-white/85 dark:bg-[#111d23]/85 backdrop-blur-xl border-t border-sky-100 dark:border-sky-900/30 shadow-[0_-10px_40px_rgba(0,0,0,0.05)] z-50">
<span class="font-['Inter'] font-medium text-sm text-[#002a4d] font-bold">SmartLeather v1 Operational System</span>
<div class="flex gap-4">
<a class="font-['Inter'] font-medium text-sm text-slate-500 hover:text-[#002a4d] hover:bg-sky-50 px-3 py-1 rounded transition-colors" href="#">Profile</a>
<a class="font-['Inter'] font-medium text-sm text-slate-500 hover:text-[#002a4d] hover:bg-sky-50 px-3 py-1 rounded transition-colors" href="#">Logout</a>
</div>
</footer>
</body></html>
