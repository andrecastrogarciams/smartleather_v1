<!DOCTYPE html>

<html class="light" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-secondary-container": "#526772",
              "surface-dim": "#cfdce4",
              "outline-variant": "#c3c6cf",
              "primary": "#002a4d",
              "on-primary-fixed-variant": "#25486f",
              "inverse-on-surface": "#e6f3fb",
              "surface-container-high": "#ddeaf2",
              "on-secondary": "#ffffff",
              "background": "#f4faff",
              "primary-container": "#1b4066",
              "tertiary-fixed": "#83fc8e",
              "surface-container": "#e3f0f8",
              "on-primary": "#ffffff",
              "surface-tint": "#3e6088",
              "on-error-container": "#93000a",
              "error": "#ba1a1a",
              "on-tertiary": "#ffffff",
              "on-background": "#111d23",
              "on-tertiary-fixed": "#002106",
              "on-secondary-fixed": "#071e27",
              "secondary-container": "#cfe6f2",
              "tertiary": "#00300b",
              "surface-variant": "#d7e4ec",
              "on-primary-fixed": "#001c37",
              "on-surface-variant": "#43474e",
              "inverse-primary": "#a7c9f6",
              "tertiary-fixed-dim": "#66df75",
              "secondary": "#4c616c",
              "surface-bright": "#f4faff",
              "on-secondary-fixed-variant": "#354a53",
              "surface-container-low": "#e9f6fd",
              "on-tertiary-fixed-variant": "#00531a",
              "on-error": "#ffffff",
              "primary-fixed": "#d2e4ff",
              "surface-container-lowest": "#ffffff",
              "secondary-fixed": "#cfe6f2",
              "secondary-fixed-dim": "#b4cad6",
              "surface-container-highest": "#d7e4ec",
              "outline": "#73777f",
              "error-container": "#ffdad6",
              "on-surface": "#111d23",
              "on-tertiary-container": "#46c05a",
              "inverse-surface": "#263238",
              "tertiary-container": "#004916",
              "primary-fixed-dim": "#a7c9f6",
              "on-primary-container": "#8aacd8",
              "surface": "#f4faff"
            },
            fontFamily: {
              "headline": ["Inter"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .alert-pulse {
        animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.8; }
      }
    </style>
</head>
<body class="bg-background font-body text-on-background overflow-hidden">
<!-- TopNavBar -->
<header class="bg-[#002a4d] dark:bg-[#001a33] shadow-2xl shadow-blue-900/20 docked full-width top-0 z-50 bg-gradient-to-r from-[#002a4d] to-[#1b4066] flex justify-between items-center w-full px-8 py-4 fixed">
<div class="flex items-center gap-8">
<span class="text-2xl font-black tracking-tighter text-white uppercase">SmartLeather</span>
<nav class="hidden md:flex gap-6 font-['Inter'] font-bold tracking-tight text-lg text-sky-50 dark:text-sky-100">
<a class="text-sky-300/70 hover:text-white transition-colors" href="#">Sector</a>
<a class="text-white border-b-2 border-sky-400 pb-1" href="#">Production Line</a>
</nav>
</div>
<div class="flex items-center gap-4 text-sky-50">
<button class="p-2 hover:bg-white/10 transition-all duration-200 active:scale-95">
<span class="material-symbols-outlined" data-icon="sensors">sensors</span>
</button>
<button class="p-2 hover:bg-white/10 transition-all duration-200 active:scale-95">
<span class="material-symbols-outlined" data-icon="sync">sync</span>
</button>
</div>
</header>
<!-- SideNavBar (Suppressed for high-alert focus as per UX Goal - focused journey) -->
<!-- Main Content Canvas -->
<main class="min-h-screen flex flex-col items-center justify-center relative p-6">
<!-- Alert Background Layer -->
<div class="absolute inset-0 bg-gradient-to-br from-error-container via-surface-bright to-secondary-container opacity-40 -z-10"></div>
<div class="absolute inset-0 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-error-container/30 via-transparent to-transparent -z-10"></div>
<!-- High Alert Status Module -->
<div class="w-full max-w-4xl space-y-12 text-center">
<!-- Icon & Brand Context -->
<div class="flex flex-col items-center space-y-4">
<div class="w-24 h-24 rounded-full bg-error flex items-center justify-center shadow-xl shadow-error/20 alert-pulse">
<span class="material-symbols-outlined text-white text-5xl" style="font-variation-settings: 'FILL' 1;">warning</span>
</div>
<div class="inline-flex items-center gap-2 px-4 py-1.5 bg-on-error-container text-error-container rounded-full font-label text-xs font-bold uppercase tracking-[0.2em]">
                    Machine ID: L-042 • Automated Stop
                </div>
</div>
<!-- Warning Text -->
<div class="space-y-4">
<h1 class="text-6xl md:text-8xl font-black tracking-tighter text-on-error-container leading-none">
                    PARADA AUTOMÁTICA DETECTADA
                </h1>
<p class="text-2xl md:text-3xl font-medium text-secondary italic">
                    Ausência de sinal por 5 minutos
                </p>
</div>
<!-- Bento Stats Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-3xl mx-auto">
<div class="bg-surface-container-lowest/85 backdrop-blur-xl p-8 rounded-xl shadow-sm flex flex-col items-start border-l-8 border-primary">
<span class="font-label text-sm uppercase tracking-widest text-secondary font-bold mb-2">Início</span>
<span class="text-5xl font-black text-primary tabular-nums">14:10</span>
<span class="text-sm text-secondary-fixed-variant mt-2">Horário Local do Sistema</span>
</div>
<div class="bg-surface-container-lowest/85 backdrop-blur-xl p-8 rounded-xl shadow-sm flex flex-col items-start border-l-8 border-error">
<span class="font-label text-sm uppercase tracking-widest text-secondary font-bold mb-2">Duração</span>
<span class="text-5xl font-black text-on-error-container tabular-nums">00:05:22</span>
<span class="text-sm text-on-error-container/70 mt-2">Tempo total em inatividade</span>
</div>
</div>
<!-- Action Area -->
<div class="pt-8 flex flex-col items-center gap-6">
<button class="group relative bg-tertiary text-white h-24 px-16 rounded-lg font-headline text-2xl font-black tracking-widest transition-all hover:translate-y-[-4px] active:scale-95 active:ring-4 ring-tertiary-fixed-dim/30 shadow-2xl shadow-tertiary/20 flex items-center gap-4">
<span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
                    RETOMAR PRODUÇÃO
                    <div class="absolute -top-1 -right-1 w-4 h-4 bg-tertiary-fixed-dim rounded-full alert-pulse"></div>
</button>
<div class="flex gap-4">
<button class="px-6 py-3 font-label font-bold text-primary hover:bg-primary/5 rounded-lg transition-colors flex items-center gap-2">
<span class="material-symbols-outlined">report</span>
                        ABRIR INCIDÊNCIA
                    </button>
<button class="px-6 py-3 font-label font-bold text-secondary hover:bg-secondary/5 rounded-lg transition-colors flex items-center gap-2">
<span class="material-symbols-outlined">history</span>
                        LOG DE ERROS
                    </button>
</div>
</div>
</div>
<!-- Decorative Industrial Texture -->
<div class="fixed bottom-0 right-0 p-12 opacity-5 pointer-events-none">
<span class="text-9xl font-black tracking-tighter uppercase select-none">SMARTLEATHER</span>
</div>
</main>
<!-- Footer -->
<footer class="bg-white/85 dark:bg-[#111d23]/85 backdrop-blur-xl docked full-width bottom-0 z-50 border-t border-sky-100 dark:border-sky-900/30 fixed bottom-0 left-0 w-full flex justify-between items-center px-8 py-3 font-['Inter'] font-medium text-sm">
<div class="text-[#002a4d] font-bold">SmartLeather v1 Operational System</div>
<div class="flex gap-6">
<a class="text-slate-500 dark:text-slate-400 hover:text-[#002a4d] hover:bg-sky-50 dark:hover:bg-sky-900/20 px-3 py-1 rounded transition-colors" href="#">Profile</a>
<a class="text-slate-500 dark:text-slate-400 hover:text-[#002a4d] hover:bg-sky-50 dark:hover:bg-sky-900/20 px-3 py-1 rounded transition-colors" href="#">Logout</a>
</div>
</footer>
</body></html>
