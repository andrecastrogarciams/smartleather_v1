<!-- TopNavBar (Derived from JSON with Login Overrides) -->
<!-- Suppression Logic: Navigation links hidden for focused login task -->
<header class="docked full-width top-0 z-50 bg-gradient-to-r from-[#002a4d] to-[#1b4066] shadow-2xl shadow-blue-900/20 flex justify-between items-center w-full px-8 py-4">
<div class="flex items-center gap-6">
<span class="text-2xl font-black tracking-tighter text-white uppercase font-headline">SmartLeather</span>
<div class="h-6 w-[1px] bg-white/20"></div>
<div class="flex flex-col">
<span class="text-[10px] font-bold tracking-[0.2em] text-sky-300 uppercase">Station Context</span>
<div class="flex gap-3 items-center">
<span class="text-xs font-semibold text-white tracking-widest uppercase">Sector</span>
<span class="w-1.5 h-1.5 rounded-full bg-sky-400"></span>
<span class="text-xs font-semibold text-white tracking-widest uppercase">Production Line</span>
</div>
</div>
</div>
<div class="flex items-center gap-4">
<div class="flex items-center gap-2 bg-tertiary/20 px-3 py-1.5 rounded-full border border-tertiary-fixed-dim/30">
<span class="material-symbols-outlined text-tertiary-fixed-dim text-sm" style="font-variation-settings: 'FILL' 1;">sensors</span>
<span class="text-[10px] font-bold text-tertiary-fixed-dim tracking-widest uppercase">Online</span>
</div>
<button class="text-sky-50 hover:bg-white/10 p-2 rounded transition-all duration-200 active:scale-95">
<span class="material-symbols-outlined">sync</span>
</button>
</div>
</header>
<main class="flex-grow flex items-center justify-center bg-industrial-texture relative px-6" data-alt="Close up of high quality blue leather texture with subtle industrial workshop lighting in background">
<!-- Login Card -->
<div class="w-full max-w-[480px] bg-white/85 backdrop-blur-xl rounded-xl shadow-[0_20px_50px_rgba(17,29,35,0.06)] overflow-hidden flex flex-col items-center p-12 border border-white">
<!-- Logo Section -->
<div class="mb-12 w-full flex flex-col items-center">
<img alt="Viposa Logo" class="h-16 mb-6 object-contain" data-alt="Minimalist corporate logo for Viposa leather manufacturing company with sharp geometric lines and blue accents" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDy7fAj6oX7y-b5Jtny4UP6ASHVWCE9xZgKUiRH6-E8cZH5wLLCILbrfMJv0p1Or5EIX2cUzgOLa_l-o5K4dZ5wiTgwD-36ZhfRlGuAS5H4hsQXm1iFT9JHSvDyUB68nLXoKbSOLfp6zk7oOVNLzGrRRpl2_Sdg4vHsq9b3h-ilarPHcUfaTGgfDEFkqyrkTrH234x_KodHjcUGh-maHy4xsr4GzVX8_0ugwjM7v7IeduXpjqS0_Wczqa_HJ16007Wjac4BqatMJ1M"/>
<div class="w-12 h-1 bg-primary rounded-full"></div>
</div>
<!-- Login Form -->
<div class="w-full space-y-8">
<div class="space-y-6">
<!-- Matrícula Input -->
<div class="relative group">
<label class="block text-[10px] font-bold tracking-[0.15em] text-on-surface-variant uppercase mb-2 ml-1">Matrícula</label>
<div class="relative flex items-center">
<span class="absolute left-4 material-symbols-outlined text-outline">badge</span>
<input class="w-full h-14 pl-12 pr-4 bg-surface-container-high border-b-2 border-transparent focus:border-primary focus:ring-0 transition-all font-headline font-bold text-lg text-primary placeholder:text-outline/50 rounded-t-lg" placeholder="000000" type="text"/>
</div>
</div>
<!-- Senha Input -->
<div class="relative group">
<label class="block text-[10px] font-bold tracking-[0.15em] text-on-surface-variant uppercase mb-2 ml-1">Senha</label>
<div class="relative flex items-center">
<span class="absolute left-4 material-symbols-outlined text-outline">lock</span>
<input class="w-full h-14 pl-12 pr-4 bg-surface-container-high border-b-2 border-transparent focus:border-primary focus:ring-0 transition-all font-headline font-bold text-lg text-primary placeholder:text-outline/50 rounded-t-lg" placeholder="••••••••" type="password"/>
</div>
</div>
</div>
<!-- Action Button -->
<button class="w-full h-14 bg-primary text-white rounded-lg flex items-center justify-center gap-3 font-headline font-black uppercase tracking-[0.2em] shadow-lg shadow-primary/20 hover:bg-primary-container active:ring-4 active:ring-sky-500/30 transition-all duration-300">
                    Entrar
                    <span class="material-symbols-outlined text-xl">login</span>
</button>
</div>
<!-- Context Info (Lower Card) -->
<div class="mt-12 pt-8 border-t border-surface-variant w-full flex justify-between items-end">
<div class="space-y-1">
<p class="text-[10px] font-bold text-outline uppercase tracking-widest">Version</p>
<p class="text-xs font-semibold text-primary">v1.0.4-stable</p>
</div>
<div class="text-right space-y-1">
<p class="text-[10px] font-bold text-outline uppercase tracking-widest">Auth Level</p>
<p class="text-xs font-semibold text-primary">Operator Access</p>
</div>
</div>
</div>
<!-- Decorative Background Element -->
<div class="absolute bottom-0 right-0 p-12 opacity-5 pointer-events-none select-none">
<span class="text-[12rem] font-black tracking-tighter leading-none text-primary uppercase">VIPOSA</span>
